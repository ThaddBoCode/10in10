<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10in10 - Dashboard</title>
    <style>
        @font-face{font-family:'ZF Prometo';src:url('../Font/Font/Webfonts/WOFF2/ZFPrometo_W_Lt.woff2') format('woff2');font-weight:300;}
        @font-face{font-family:'ZF Prometo';src:url('../Font/Font/Webfonts/WOFF2/ZFPrometo_W_Md.woff2') format('woff2');font-weight:500;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'ZF Prometo',system-ui,sans-serif;background:#050505;color:#fff;font-weight:300;}

        /* Farbkonzept:
           Lila #818CF8  = Neutral / Werte / Hauptfarbe
           Tuerkis #34D399 = Positiv / Ziel erreicht
           Gelb #FBBF24  = Achtung / Noch offen
           Rosa #FB7185  = Kalorienaufnahme (gegessen)
        */

        .phone{width:390px;height:844px;margin:20px auto;border-radius:40px;border:3px solid #333;overflow:hidden;position:relative;background:#0C0C1D;background-image:linear-gradient(135deg,#0C0C1D 0%,#1a0a2e 30%,#0C0C1D 50%,#0a1628 70%,#0C0C1D 100%);}
        .notch{width:160px;height:34px;background:#000;border-radius:0 0 20px 20px;margin:0 auto;}
        .scr{height:calc(100% - 34px);overflow-y:auto;padding-bottom:90px;}
        .scr::-webkit-scrollbar{display:none;}
        .cd{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(255,255,255,0.08);}

        .tbar{position:absolute;bottom:0;left:0;right:0;height:85px;background:rgba(12,12,29,0.92);backdrop-filter:blur(20px);display:flex;justify-content:space-around;align-items:flex-start;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);}
        .tab{display:flex;flex-direction:column;align-items:center;gap:4px;}
        .tab .ic{color:rgba(255,255,255,0.3);width:22px;height:22px;}
        .tab.on .ic{color:#818CF8;}
        .tab span{font-size:10px;color:rgba(255,255,255,0.3);}
        .tab.on span{color:#818CF8;}
        .tab-c{margin-top:-22px;}
        .tab-c .ic{width:52px!important;height:52px!important;background:linear-gradient(135deg,#818CF8,#34D399);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white!important;box-shadow:0 4px 20px rgba(129,140,248,0.4);}
    </style>
</head>
<body>
<div class="phone">
<div class="notch"></div>
<div class="scr">

    <div style="padding:14px 20px 0;font-size:13px;color:rgba(255,255,255,0.45);">Samstag, 29. März</div>
    <div style="font-size:24px;font-weight:500;padding:2px 20px 0;">Hallo Max</div>

    <!-- Hero: Gewicht links + 2 Ringe rechts -->
    <div style="display:flex;align-items:center;gap:12px;margin:14px 20px;">
        <div>
            <div style="font-size:48px;font-weight:500;color:#818CF8;line-height:1;">86.5</div>
            <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-top:2px;">kg &bull; ↓0.3 seit gestern</div>
        </div>

        <div style="display:flex;gap:6px;margin-left:auto;">
            <!-- Ring: Verbrauch -->
            <div style="position:relative;width:72px;height:72px;">
                <svg viewBox="0 0 72 72" style="width:100%;height:100%;">
                    <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(129,140,248,0.1)" stroke-width="4"/>
                    <circle cx="36" cy="36" r="30" fill="none" stroke="#818CF8" stroke-width="4"
                        stroke-dasharray="188" stroke-dashoffset="113" stroke-linecap="round" transform="rotate(-90 36 36)"/>
                </svg>
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
                    <div style="font-size:12px;font-weight:500;color:#818CF8;">2.640</div>
                    <div style="font-size:6px;color:rgba(255,255,255,0.25);">Verbrauch</div>
                </div>
            </div>

            <!-- Ring: Defizit -->
            <div style="position:relative;width:72px;height:72px;">
                <svg viewBox="0 0 72 72" style="width:100%;height:100%;">
                    <circle cx="36" cy="36" r="30" fill="none" stroke="rgba(129,140,248,0.1)" stroke-width="4"/>
                    <circle cx="36" cy="36" r="30" fill="none" stroke="#A5B4FC" stroke-width="4"
                        stroke-dasharray="188" stroke-dashoffset="47" stroke-linecap="round" transform="rotate(-90 36 36)"/>
                </svg>
                <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
                    <div style="font-size:12px;font-weight:500;color:#A5B4FC;">-1.190</div>
                    <div style="font-size:6px;color:rgba(255,255,255,0.25);">Defizit</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Heute Zeile -->
    <div style="display:flex;gap:1px;margin:0 20px;border-radius:14px;overflow:hidden;">
        <div style="flex:1;padding:10px;background:rgba(129,140,248,0.06);text-align:center;">
            <div style="font-size:7px;color:rgba(255,255,255,0.25);text-transform:uppercase;">Verbrannt</div>
            <div style="font-size:16px;font-weight:500;color:#818CF8;margin-top:2px;">2.640</div>
        </div>
        <div style="flex:1;padding:10px;background:rgba(251,113,133,0.06);text-align:center;">
            <div style="font-size:7px;color:rgba(255,255,255,0.25);text-transform:uppercase;">Gegessen</div>
            <div style="font-size:16px;font-weight:500;color:#FB7185;margin-top:2px;">1.450</div>
        </div>
        <div style="flex:1;padding:10px;background:rgba(129,140,248,0.06);text-align:center;">
            <div style="font-size:7px;color:rgba(255,255,255,0.25);text-transform:uppercase;">Trainings</div>
            <div style="font-size:16px;font-weight:500;color:#818CF8;margin-top:2px;">1</div>
        </div>
    </div>

    <!-- Woche -->
    <div style="margin:14px 20px 0;font-size:11px;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:1.5px;">Diese Woche</div>

    <!-- Gewicht -->
    <div class="cd" style="margin:8px 20px;padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:12px;font-weight:500;">Gewicht</span>
            <span style="font-size:11px;color:#A5B4FC;">-0.6 von -1.0 kg</span>
        </div>
        <div style="height:8px;border-radius:4px;background:rgba(129,140,248,0.08);overflow:hidden;">
            <div style="height:100%;width:60%;border-radius:4px;background:#818CF8;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:8px;color:rgba(255,255,255,0.2);">
            <span>87.1 Mo</span>
            <span>86.5 heute</span>
        </div>
    </div>

    <!-- Training -->
    <div class="cd" style="margin:6px 20px;padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:12px;font-weight:500;">Training</span>
            <span style="font-size:11px;color:#A5B4FC;">3 von 5</span>
        </div>
        <div style="display:flex;gap:4px;">
            <div style="flex:1;height:8px;border-radius:4px;background:#818CF8;"></div>
            <div style="flex:1;height:8px;border-radius:4px;background:#818CF8;"></div>
            <div style="flex:1;height:8px;border-radius:4px;background:#818CF8;"></div>
            <div style="flex:1;height:8px;border-radius:4px;background:rgba(129,140,248,0.1);"></div>
            <div style="flex:1;height:8px;border-radius:4px;background:rgba(129,140,248,0.1);"></div>
        </div>
    </div>

    <!-- Kalorien -->
    <div class="cd" style="margin:6px 20px;padding:12px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:12px;font-weight:500;">Kalorien (Training)</span>
            <span style="font-size:11px;color:#A5B4FC;">2.420 / 3.500</span>
        </div>
        <div style="height:8px;border-radius:4px;background:rgba(129,140,248,0.08);overflow:hidden;">
            <div style="height:100%;width:69%;border-radius:4px;background:#818CF8;"></div>
        </div>
    </div>

    <!-- Streak -->
    <div style="display:flex;align-items:center;gap:8px;margin:10px 20px;padding:8px 12px;border-radius:12px;background:rgba(129,140,248,0.04);border:1px solid rgba(129,140,248,0.08);">
        <span>🔥</span><span style="font-weight:500;color:#818CF8;">12</span><span style="font-size:10px;color:rgba(255,255,255,0.3);">Tage gewogen</span>
        <span style="margin-left:auto;">💪</span><span style="font-weight:500;color:#818CF8;">3</span><span style="font-size:10px;color:rgba(255,255,255,0.3);">Wo Training</span>
    </div>

</div>

<div class="tbar">
    <div class="tab on"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Home</span></div>
    <div class="tab"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span>Training</span></div>
    <div class="tab tab-c"><div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;"><path d="M6 7v-2a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/><path d="M2 12h20"/><rect x="2" y="7" width="20" height="14" rx="2"/></svg></div><span style="margin-top:6px;">Wiegen</span></div>
    <div class="tab"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg><span>Team</span></div>
    <div class="tab"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg><span>Profil</span></div>
</div>
</div>
</body>
</html>
